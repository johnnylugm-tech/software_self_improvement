# Harness Quality Framework - Advanced Configuration
# 9 core + 7 extended dimensions
# Use for: Critical systems, compliance-required projects, maximum quality assurance

version: "1.0"

quality:
  target: 85
  max_rounds: 3
  early_stop: true
  commit_per_fix: true

workspace:
  work_dir: ".sessi-work"
  preserve_git: true

# All 16 dimensions (9 core + 7 extended)
dimensions:

  # === CORE DIMENSIONS (9) ===

  linting:
    enabled: true
    weight: 0.06
    target: 95
    tools:
      - eslint
      - pylint
      - clippy
      - golangci-lint

  type_safety:
    enabled: true
    weight: 0.10
    target: 95
    tools:
      - pyright
      - eslint
      - rustc
      - javac

  test_coverage:
    enabled: true
    weight: 0.12
    target: 80
    tools:
      - coverage
      - nyc
      - tarpaulin
      - jacoco

  security:
    enabled: true
    weight: 0.10
    target: 90
    tools:
      - bandit
      - npm-audit
      - cargo-audit
      - git-secrets

  performance:
    enabled: true
    weight: 0.08
    target: 80
    tools:
      - pytest-benchmark
      - lighthouse
      - cargo-criterion
      - jmh

  architecture:
    enabled: true
    weight: 0.08
    target: 80
    tools:
      - sonarqube
      - codeql
      - architecture-tests

  readability:
    enabled: true
    weight: 0.07
    target: 85
    tools:
      - radon
      - eslint-plugin-sonarjs
      - clippy

  error_handling:
    enabled: true
    weight: 0.09
    target: 85
    tools:
      - custom-checks
      - pytest
      - jest

  documentation:
    enabled: true
    weight: 0.10
    target: 85
    tools:
      - pydocstyle
      - jsdoc
      - rustdoc
      - javadoc

  # === EXTENDED DIMENSIONS (7) ===
  # These are DISABLED by default. Enable individually based on your needs.
  # Each has prerequisites listed below.

  mutation_testing:
    enabled: false
    # PREREQUISITES: coverage >= 70%, tests run < 10 min
    weight: 0.10
    target: 70
    tools:
      - mutmut              # Python
      - stryker             # Multi-language
    description: |
      Validates test suite quality by injecting code mutations.
      Reveals coverage gaps and weak assertions.
      High priority: do first if enabling extended dims.

  property_testing:
    enabled: false
    # PREREQUISITES: linting ✓, type_safety >= 90%
    weight: 0.07
    target: 75
    tools:
      - hypothesis          # Python
      - fast-check          # JavaScript
    description: |
      Generates edge case test data automatically.
      Finds subtle bugs in business logic.
      Medium priority: enables after mutation testing.

  fuzzing:
    enabled: false
    # PREREQUISITES: security >= 85%, error_handling >= 80%
    weight: 0.08
    target: 70
    tools:
      - atheris             # Python (requires 3.9+)
      - jazzer              # Java/JVM
    description: |
      Continuous input mutation for crash discovery.
      Finds buffer overflows, parsing bugs.
      Medium priority: critical for security-sensitive code.

  license_compliance:
    enabled: false
    # PREREQUISITES: None (can run anytime)
    weight: 0.05
    target: 95
    tools:
      - scancode            # License scanner
      - fossa               # Dependency tracking
    description: |
      Tracks and verifies open source license compatibility.
      Prevents GPL/proprietary conflicts.
      Low priority: governance requirement.

  accessibility:
    enabled: false
    # PREREQUISITES: readability >= 80% (UI code only)
    weight: 0.06
    target: 85
    tools:
      - pa11y               # Automated a11y testing
      - axe-core            # Accessibility engine
    description: |
      Detects WCAG 2.1 Level AA violations.
      Mandatory for public-facing UIs.
      Medium priority: legal + UX requirement.

  observability:
    enabled: false
    # PREREQUISITES: None (can run anytime)
    weight: 0.05
    target: 80
    tools:
      - syft                # SBOM generator
      - grype               # Vulnerability scanner
    description: |
      Detects gaps in logging, metrics, tracing.
      Assesses production readiness.
      Low priority: hardening + operations.

  supply_chain_security:
    enabled: false
    # PREREQUISITES: security >= 85%
    weight: 0.06
    target: 80
    tools:
      - cosign              # Artifact signing
    description: |
      Verifies artifact signatures and provenance.
      Ensures code integrity in CI/CD.
      Low priority: security posture.

# Score calculation (same across core and extended)
scoring:
  reconcile_method: "min"
  evidence_threshold: 10
  tool_diff_min_lines: 3
  cap_unsupported_delta: 3
  regression_detection: true
  revert_on_regression: true

evaluation:
  tool_first: true
  evidence_required: true
  per_dimension_depth: "thorough"
  explain_gaps: true

# Installation guide for extended dimensions
extended_dims_setup: |
  Extended dimensions require additional tool installation.
  See docs/INSTALL_EXTENDED_DIMS.md for detailed steps.

  Quick install by priority:
  - HIGH:   ./scripts/install_extended_tools.sh --high
  - MEDIUM: ./scripts/install_extended_tools.sh --medium
  - LOW:    ./scripts/install_extended_tools.sh --low
  - ALL:    ./scripts/install_extended_tools.sh --all

  After install, change 'enabled: false' to 'enabled: true' for desired dims.
